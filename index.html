<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界の国旗クイズ - Flag Quiz</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="app" class="app-container">
        <!-- メインメニュー -->
        <main id="menu-screen" class="screen active">
            <header>
                <h1 class="title">世界の国旗クイズ</h1>
                <p class="subtitle">Flag Quiz Masters</p>
            </header>
            <div class="menu-content">
                <div class="stats-summary">
                    <div class="stat-item">
                        <span class="stat-label">ハイスコア</span>
                        <span id="high-score" class="stat-value">0</span>
                    </div>
                </div>
                <div id="unlock-message" class="unlock-message hidden">
                    ✨ 新しいモードがえらべるよ！ ✨
                </div>
                <div id="mode-buttons" class="mode-buttons-container">
                    <button id="start-btn" class="btn btn-primary" data-mode="1">クイズ☆スタート！</button>
                    <button id="start-hard-btn" class="btn btn-warning hidden" data-mode="2">ふつうからスタート</button>
                    <button id="start-extreme-btn" class="btn btn-danger hidden" data-mode="3">むずかしいからスタート</button>
                </div>
                <button id="record-btn" class="btn btn-secondary" style="margin-top: 12px;">🏆 これまでのきろく</button>
            </div>
        </main>

        <!-- クイズ画面 -->
        <section id="quiz-screen" class="screen">
            <div class="quiz-header">
                <div class="quiz-info">
                    <span id="question-number">第 1 問</span>
                    <div class="score-container">
                        <span>スコア: </span>
                        <span id="current-score">0</span>
                    </div>
                </div>
                <div class="progress-bar-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
            </div>

            <div class="flag-container glass">
                <img id="flag-image" src="" alt="国旗">
            </div>

            <div id="options-container" class="options-grid">
                <!-- 選択肢ボタンがここに入る -->
            </div>

            <div id="feedback" class="feedback-overlay">
                <div class="feedback-content">
                    <div class="feedback-header">
                        <span id="feedback-icon"></span>
                        <span id="feedback-text"></span>
                    </div>
                    <div id="feedback-details" class="feedback-details">
                        <!-- ここに正解の国旗と名前が入る -->
                    </div>
                </div>
            </div>
        </section>

        <!-- 結果画面 -->
        <section id="result-screen" class="screen">
            <h2 class="result-title">結果発表</h2>
            <div class="final-score-container glass">
                <span class="final-score-label">獲得スコア</span>
                <span id="final-score" class="final-score-value">0</span>
            </div>
            <div class="result-actions">
                <button id="restart-btn" class="btn btn-primary">もう一度挑戦</button>
                <button id="back-to-menu-btn" class="btn btn-secondary">メニューに戻る</button>
            </div>
        </section>

        <!-- 記録画面 -->
        <section id="record-screen" class="screen">
            <header>
                <h2 class="title" style="font-size: 2rem;">これまでのきろく</h2>
            </header>
            <div class="records-container glass"
                style="width: 100%; padding: 24px; margin-top: 24px; margin-bottom: 32px;">
                <div class="record-item"
                    style="display: flex; justify-content: space-between; margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px;">
                    <span style="font-size: 1.1rem;">あそんだ回数</span>
                    <span id="record-play-count" style="font-size: 1.5rem; font-weight: bold; color: #818cf8;">0</span>
                </div>
                <div class="record-item"
                    style="display: flex; justify-content: space-between; margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px;">
                    <span style="font-size: 1.1rem;">ハイスコア</span>
                    <span id="record-high-score" style="font-size: 1.5rem; font-weight: bold; color: #fcd34d;">0</span>
                </div>
                <div class="record-item" style="display: flex; justify-content: space-between;">
                    <span style="font-size: 1.1rem;">100点とった回数</span>
                    <span id="record-perfect-count"
                        style="font-size: 1.5rem; font-weight: bold; color: #10b981;">0</span>
                </div>
            </div>

            <!-- アンロック情報の表示 -->
            <div class="unlock-info glass"
                style="width: 100%; padding: 16px; margin-bottom: 32px; background: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.3);">
                <p style="text-align: center; font-size: 0.9rem; margin-bottom: 8px;">💡 ヒント</p>
                <p style="text-align: center; font-size: 0.9rem; color: #cbd5e1;">100点を3回とると、むずかしいモードが出てくるよ！</p>
            </div>

            <button id="close-record-btn" class="btn btn-secondary">もどる</button>
        </section>

        <!-- ローディング -->
        <div id="loading-overlay" class="loading-overlay hidden">
            <div class="loader"></div>
            <p>国旗データを取得中...</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
